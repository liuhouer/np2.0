<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('注册', null, null)"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">加入 NorthPark</h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    已有账号？
                    <a th:href="@{/login(redirectURI=${redirectURI})}" class="font-medium text-blue-600 hover:text-blue-500">
                        去登录
                    </a>
                </p>
            </div>
            
            <form class="mt-8 space-y-6" id="signupForm" method="POST">
                <input type="hidden" name="redirectURI" id="redirectURI" th:value="${redirectURI}">
                <div class="rounded-md shadow-sm space-y-4">
                    <div>
                        <label for="email" class="sr-only">邮箱地址</label>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="邮箱地址">
                    </div>
                    <div class="flex space-x-2">
                        <input id="emailCode" name="code" type="text" required 
                               class="appearance-none rounded-xl relative block flex-grow px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="邮箱验证码">
                        <button type="button" id="sendCodeBtn" 
                                class="px-4 py-3 border border-gray-300 rounded-xl text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors whitespace-nowrap">
                            发送验证码
                        </button>
                    </div>
                    <div>
                        <label for="password" class="sr-only">密码</label>
                        <input id="password" name="password" type="password" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="密码">
                    </div>
                </div>

                <div>
                    <button type="button" id="signupBtn" 
                            class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                        注册并加入
                    </button>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <script>
        $(document).ready(function () {
            var isEmailVerified = false;
            var countdown = 0;

            function startCountdown() {
                countdown = 60;
                var btn = $("#sendCodeBtn");
                btn.attr("disabled", true);
                var timer = setInterval(function () {
                    btn.text("重新发送(" + countdown + ")");
                    countdown--;
                    if (countdown < 0) {
                        clearInterval(timer);
                        btn.text("发送验证码").removeAttr("disabled");
                        countdown = 0;
                    }
                }, 1000);
            }

            $("#sendCodeBtn").click(function () {
                var email = $("#email").val();
                if (!email) {
                    Swal.fire({
                        icon: 'warning',
                        title: '提示',
                        text: '请输入邮箱地址',
                        confirmButtonText: '确定',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                        }
                    });
                    return;
                }
                
                $.ajax({
                    url: "/api/v1/auth/register-email",
                    type: "POST",
                    data: { email: email },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            Swal.fire({
                                icon: 'success',
                                title: '发送成功',
                                text: '验证码已成功发送到您的邮箱',
                                confirmButtonText: '确定',
                                buttonsStyling: false,
                                customClass: {
                                    confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                                }
                            });
                            startCountdown();
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: '发送失败',
                                text: res.message,
                                confirmButtonText: '确定',
                                buttonsStyling: false,
                                customClass: {
                                    confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                                }
                            });
                        }
                    },
                    error: function () {
                        Swal.fire({
                            icon: 'error',
                            title: '错误',
                            text: '验证码发送失败，请检查网络',
                            confirmButtonText: '确定',
                            buttonsStyling: false,
                            customClass: {
                                confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                            }
                        });
                    }
                });
            });

            $("#emailCode").blur(function () {
                var email = $("#email").val();
                var code = $(this).val();
                if (!email || !code) return;

                $.ajax({
                    url: "/api/v1/auth/verify-email-code",
                    type: "POST",
                    data: { email: email, code: code },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            isEmailVerified = true;
                            $("#emailCode").css("border-color", "#10B981");
                        } else {
                            isEmailVerified = false;
                            $("#emailCode").css("border-color", "#EF4444");
                        }
                    }
                });
            });

            $("#signupBtn").click(function () {
                var email = $("#email").val();
                var password = $("#password").val();
                if (!isEmailVerified) {
                    Swal.fire({
                        icon: 'warning',
                        title: '提示',
                        text: '请先通过邮箱验证码校验',
                        confirmButtonText: '确定',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                        }
                    });
                    return;
                }
                if (!password || password.length < 6) {
                    Swal.fire({
                        icon: 'warning',
                        title: '提示',
                        text: '密码长度不能少于6位',
                        confirmButtonText: '确定',
                        buttonsStyling: false,
                        customClass: {
                            confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                        }
                    });
                    return;
                }

                $.ajax({
                    url: "/api/v1/auth/signup",
                    type: "POST",
                    data: {
                        email: email,
                        password: password
                    },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            var redirect = $("#redirectURI").val();
                            window.location.href = redirect ? redirect : "/";
                        } else {
                            Swal.fire({
                                icon: 'error',
                                title: '注册失败',
                                text: res.message,
                                confirmButtonText: '确定',
                                buttonsStyling: false,
                                customClass: {
                                    confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                                }
                            });
                        }
                    },
                    error: function () {
                        Swal.fire({
                            icon: 'error',
                            title: '错误',
                            text: '注册异常，请重试',
                            confirmButtonText: '确定',
                            buttonsStyling: false,
                            customClass: {
                                confirmButton: 'px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm font-medium hover:bg-blue-700'
                            }
                        });
                    }
                });
            });
        });
    </script>
</body>
</html>
