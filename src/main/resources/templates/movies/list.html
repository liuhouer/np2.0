<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('影视列表', null, null)"></head>
<body class="flex flex-col min-h-screen">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-8">
            <!-- Main Content List -->
            <div class="lg:col-span-3">
                <div class="mb-6 flex justify-between items-center">
                    <h1 class="text-2xl font-bold tracking-tight text-gray-900">影视窝</h1>
                    <div class="flex space-x-2">
                        <a th:href="@{/movies(orderBy='latest', keyword=${keyword})}" 
                           class="px-3 py-1.5 text-xs font-medium rounded-full"
                           th:classappend="${orderBy == 'latest'} ? 'bg-gray-900 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'">最新</a>
                        <a th:href="@{/movies(orderBy='hot', keyword=${keyword})}" 
                           class="px-3 py-1.5 text-xs font-medium rounded-full"
                           th:classappend="${orderBy == 'hot'} ? 'bg-gray-900 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'">最热</a>
                    </div>
                </div>

                <!-- Grid List -->
                <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
                    <div th:each="item : ${list}" class="bg-white rounded-2xl border border-gray-100 overflow-hidden shadow-sm hover:shadow-md transition-all duration-300 flex flex-col">
                        <!-- 电影海报图 -->
                        <div class="relative aspect-video w-full bg-gray-100 overflow-hidden">
                            <img th:if="${item.imgUrl != null}" th:src="${item.imgUrl}" th:alt="${item.movieName}" class="w-full h-full object-cover transition-transform duration-300 hover:scale-105" />
                            <div th:if="${item.imgUrl == null}" class="w-full h-full flex items-center justify-center bg-gray-50 text-gray-400">
                                <svg class="w-12 h-12 stroke-current opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M7 4v16M17 4v16M3 8h4m10 0h4M3 12h18M3 16h4m10 0h4M4 20h16a1 1 0 001-1V5a1 1 0 00-1-1H4a1 1 0 00-1 1v14a1 1 0 001 1z"></path></svg>
                            </div>
                            <span th:if="${item.tagList != null && !item.tagList.isEmpty()}" 
                                  th:style="'background-color: ' + ${item.color} + '; color: #fff;'"
                                  class="absolute top-3 left-3 px-2.5 py-0.5 rounded-md text-2xs font-semibold uppercase tracking-wide shadow-sm"
                                  th:text="${item.tagList[0].tag}">电影</span>
                        </div>
                        <div class="p-5 flex-grow flex flex-col justify-between">
                            <div>
                                <h2 class="text-base font-semibold text-gray-900 leading-snug line-clamp-2">
                                    <a th:href="@{'/movies/post-' + ${item.id} + '.html'}" th:text="${item.movieName}" class="hover:text-blue-600 transition-colors">电影名称</a>
                                </h2>
                                <p th:if="${item.brief != null}" th:text="${item.brief}" class="text-xs text-gray-500 mt-2 line-clamp-2"></p>
                            </div>
                        </div>
                        <div class="px-5 py-3.5 bg-gray-50 border-t border-gray-100 flex items-center justify-between">
                            <span class="text-2xs text-gray-400" th:text="${item.addTime}">2026-03-14</span>
                            <a th:href="@{'/movies/post-' + ${item.id} + '.html'}" class="text-xs font-medium text-blue-600 hover:text-blue-500 flex items-center">
                                查看详情 <span class="ml-1">&rarr;</span>
                            </a>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div class="mt-12 flex justify-center space-x-1" th:if="${totalPages > 1}">
                    <a th:if="${currentPage > 1}" 
                       th:href="@{'/movies/page/' + ${currentPage - 1}(keyword=${keyword}, orderBy=${orderBy})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">&larr; 上一页</a>
                    <span class="px-4 py-2 text-sm text-gray-500" th:text="${currentPage} + ' / ' + ${totalPages}">1 / 1</span>
                    <a th:if="${currentPage < totalPages}" 
                       th:href="@{'/movies/page/' + ${currentPage + 1}(keyword=${keyword}, orderBy=${orderBy})}" 
                       class="px-3.5 py-2 rounded-lg bg-white border border-gray-300 text-sm font-medium text-gray-700 hover:bg-gray-50">下一页 &rarr;</a>
                </div>
            </div>

            <!-- Sidebar -->
            <div class="lg:col-span-1 space-y-8">
                <!-- Search Box -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm">
                    <form action="/movies" method="get">
                        <label for="search" class="block text-sm font-medium text-gray-700 mb-2">搜索影视</label>
                        <div class="flex">
                            <input type="text" id="search" name="keyword" th:value="${keyword}" placeholder="搜索资源..." class="w-full px-4 py-2 rounded-l-xl border border-gray-300 focus:outline-none focus:ring-1 focus:ring-blue-500 focus:border-blue-500 text-sm" />
                            <button type="submit" class="px-4 py-2 bg-blue-600 text-white rounded-r-xl text-sm font-medium hover:bg-blue-700">Go</button>
                        </div>
                    </form>
                </div>

                <!-- Tags Sidebar -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${moviesTags != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">热门标签</h3>
                    <div class="flex flex-wrap gap-2">
                        <a th:each="tag : ${moviesTags}" 
                           th:href="@{'/movies/tag/' + ${tag.tagCode}}" 
                           class="px-3 py-1 rounded-full text-xs bg-gray-100 text-gray-600 hover:bg-gray-200 transition-colors" 
                           th:text="${tag.tag}">标签</a>
                    </div>
                </div>

                <!-- Hot Movies -->
                <div class="bg-white p-6 rounded-2xl border border-gray-100 shadow-sm" th:if="${moviesHotList != null}">
                    <h3 class="text-sm font-medium text-gray-900 mb-4 uppercase tracking-wider">热门推荐</h3>
                    <ul class="space-y-3">
                        <li th:each="hot : ${moviesHotList}">
                            <a th:href="@{'/movies/post-' + ${hot.id} + '.html'}" 
                               th:text="${hot.movieName}" 
                               class="text-sm text-gray-600 hover:text-blue-600 transition-colors line-clamp-1">热门电影</a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
