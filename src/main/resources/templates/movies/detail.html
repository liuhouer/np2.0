<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head(${model.movieName}, ${model.tag}, ${movieDescText})"></head>
<body class="flex flex-col min-h-screen">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow max-w-4xl w-full mx-auto px-4 sm:px-6 lg:px-8 py-8">
        <!-- Breadcrumbs -->
        <nav class="flex mb-6" aria-label="Breadcrumb">
            <ol class="inline-flex items-center space-x-1 md:space-x-3 text-sm">
                <li class="inline-flex items-center">
                    <a href="/" class="inline-flex items-center text-gray-500 hover:text-gray-900">首页</a>
                </li>
                <li>
                    <div class="flex items-center">
                        <span class="text-gray-400 mx-2">/</span>
                        <a href="/movies" class="text-gray-500 hover:text-gray-900">影视</a>
                    </div>
                </li>
                <li aria-current="page">
                    <div class="flex items-center">
                        <span class="text-gray-400 mx-2">/</span>
                        <span class="text-gray-900 font-medium" th:text="${model.movieName}">电影详情</span>
                    </div>
                </li>
            </ol>
        </nav>

        <article class="bg-white rounded-3xl border border-gray-100 shadow-sm overflow-hidden p-8 md:p-12">
            <!-- Header -->
            <div class="border-b border-gray-100 pb-8 mb-8">
                <span th:if="${model.tagList != null && !model.tagList.isEmpty()}" 
                      th:style="'background-color: ' + ${model.color} + '; color: #fff;'"
                      class="inline-block px-3 py-1 rounded-full text-xs font-semibold uppercase tracking-wide mb-4"
                      th:text="${model.tagList[0].tag}">标签</span>
                <h1 class="text-3xl font-bold tracking-tight text-gray-900 mb-4" th:text="${model.movieName}">电影名称</h1>
                <div class="flex items-center space-x-4 text-sm text-gray-500">
                    <span th:text="${model.addTime}">发布时间</span>
                    <span th:if="${model.viewNum != null}" th:text="'浏览 ' + ${model.viewNum}">浏览次数</span>
                </div>
            </div>

            <!-- Description -->
            <div class="prose max-w-none text-gray-700 leading-relaxed mb-12" th:utext="${model.movieDesc}">
                详细介绍内容
            </div>

            <!-- Download Section (Secured) -->
            <div class="bg-gray-50 border border-gray-100 rounded-2xl p-6 md:p-8" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
                <h3 class="text-lg font-semibold text-gray-900 mb-4 flex items-center">
                    <svg class="w-5 h-5 mr-2 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    资源下载
                </h3>
                
                <th:block sec:authorize="isAuthenticated()">
                    <div class="bg-white border border-gray-200 rounded-xl p-4 text-sm text-gray-800 leading-relaxed font-mono" th:utext="${model.path}">
                        下载链接占位
                    </div>
                </th:block>
                <th:block sec:authorize="!isAuthenticated()">
                    <div class="text-center py-6">
                        <p class="text-sm text-gray-500 mb-4">本资源下载链接已隐藏，登录后即可浏览下载。</p>
                        <a th:href="@{/login(redirectURI=${#httpServletRequest.requestURI})}" class="inline-flex items-center px-4 py-2 bg-blue-600 border border-transparent rounded-xl text-sm font-medium text-white hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            登录后查看
                        </a>
                    </div>
                </th:block>
            </div>
        </article>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>
</body>
</html>
