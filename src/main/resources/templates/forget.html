<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">
<head th:replace="fragments/head :: head('忘记密码', null, null)"></head>
<body class="flex flex-col min-h-screen bg-gray-50">
    <header th:replace="fragments/nav :: nav"></header>

    <main class="flex-grow flex items-center justify-center py-12 px-4 sm:px-6 lg:px-8">
        <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-3xl border border-gray-100 shadow-sm">
            <div>
                <h2 class="mt-6 text-center text-3xl font-extrabold text-gray-900">找回密码</h2>
                <p class="mt-2 text-center text-sm text-gray-600">
                    想起密码了？
                    <a th:href="@{/login}" class="font-medium text-blue-600 hover:text-blue-500">
                        去登录
                    </a>
                </p>
            </div>
            
            <form class="mt-8 space-y-6" id="forgetForm" method="POST">
                <!-- 步骤一：邮箱及验证码校验 -->
                <div id="step-verification" class="space-y-4">
                    <div>
                        <label for="email" class="sr-only">邮箱地址</label>
                        <input id="email" name="email" type="email" autocomplete="email" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="已绑定的邮箱地址">
                    </div>
                    <div class="flex space-x-2">
                        <input id="emailCode" name="code" type="text" required 
                               class="appearance-none rounded-xl relative block flex-grow px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="邮箱验证码">
                        <button type="button" id="sendCodeBtn" 
                                class="px-4 py-3 border border-gray-300 rounded-xl text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-blue-500 transition-colors whitespace-nowrap">
                            发送验证码
                        </button>
                    </div>
                    <div>
                        <button type="button" id="nextStepBtn" 
                                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-blue-600 hover:bg-blue-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors">
                            下一步
                        </button>
                    </div>
                </div>

                <!-- 步骤二：重置新密码（默认隐藏） -->
                <div id="step-reset" class="space-y-4 hidden">
                    <div>
                        <label for="newPassword" class="sr-only">新密码</label>
                        <input id="newPassword" name="newPassword" type="password" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="输入新密码 (至少6位)">
                    </div>
                    <div>
                        <label for="confirmPassword" class="sr-only">确认新密码</label>
                        <input id="confirmPassword" type="password" required 
                               class="appearance-none rounded-xl relative block w-full px-4 py-3 border border-gray-300 placeholder-gray-500 text-gray-900 focus:outline-none focus:ring-blue-500 focus:border-blue-500 focus:z-10 sm:text-sm" 
                               placeholder="确认新密码">
                    </div>
                    <div>
                        <button type="button" id="resetPasswordBtn" 
                                class="group relative w-full flex justify-center py-3 px-4 border border-transparent text-sm font-medium rounded-xl text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500 transition-colors">
                            重置密码
                        </button>
                    </div>
                </div>
            </form>
        </div>
    </main>

    <footer th:replace="fragments/footer :: footer"></footer>

    <script th:src="@{https://code.jquery.com/jquery-3.6.0.min.js}"></script>
    <script>
        $(document).ready(function () {
            var countdown = 0;

            function startCountdown() {
                countdown = 60;
                var btn = $("#sendCodeBtn");
                btn.attr("disabled", true);
                var timer = setInterval(function () {
                    btn.text("重新发送(" + countdown + ")");
                    countdown--;
                    if (countdown < 0) {
                        clearInterval(timer);
                        btn.text("发送验证码").removeAttr("disabled");
                        countdown = 0;
                    }
                }, 1000);
            }

            $("#sendCodeBtn").click(function () {
                var email = $("#email").val();
                if (!email) {
                    alert("请输入邮箱地址");
                    return;
                }
                
                $.ajax({
                    url: "/api/v1/auth/forget-code",
                    type: "POST",
                    data: { email: email },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            alert("验证码已成功发送");
                            startCountdown();
                        } else {
                            alert(res.message || "验证码发送失败，请确认该邮箱已注册");
                        }
                    },
                    error: function () {
                        alert("验证码发送失败，请检查网络");
                    }
                });
            });

            $("#nextStepBtn").click(function () {
                var email = $("#email").val();
                var code = $("#emailCode").val();
                if (!email || !code) {
                    alert("请填写完整的邮箱和验证码");
                    return;
                }

                $.ajax({
                    url: "/api/v1/auth/verify-forget-code",
                    type: "POST",
                    data: { email: email, code: code },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            $("#step-verification").addClass("hidden");
                            $("#step-reset").removeClass("hidden");
                        } else {
                            alert(res.message || "验证码错误或已失效");
                        }
                    },
                    error: function () {
                        alert("验证校验失败，请重试");
                    }
                });
            });

            $("#resetPasswordBtn").click(function () {
                var email = $("#email").val();
                var newPassword = $("#newPassword").val();
                var confirmPassword = $("#confirmPassword").val();

                if (!newPassword || newPassword.length < 6) {
                    alert("密码长度不能少于6位");
                    return;
                }
                if (newPassword !== confirmPassword) {
                    alert("两次输入的密码不一致");
                    return;
                }

                $.ajax({
                    url: "/api/v1/auth/reset-password",
                    type: "POST",
                    data: {
                        email: email,
                        newPassword: newPassword
                    },
                    dataType: "json",
                    success: function (res) {
                        if (res.result) {
                            alert("密码修改成功，请前往登录");
                            window.location.href = "/login";
                        } else {
                            alert(res.message || "重置密码失败");
                        }
                    },
                    error: function () {
                        alert("重置密码异常，请重试");
                    }
                });
            });
        });
    </script>
</body>
</html>
